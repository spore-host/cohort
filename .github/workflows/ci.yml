name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build
        run: go build ./...

      # Enforce cohort's import discipline: the core must import no cloud SDK
      # and no scheduler (doc.go, API.md §8 — "not optional"). This is the
      # invariant that lets every consumer trust the SAME unmodified core.
      - name: Guard (no cloud SDK / scheduler imports)
        run: ./scripts/guard-cohort.sh

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...
